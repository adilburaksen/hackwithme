    <style>
      :root {
        /* Dark theme — warm ink, bone text, blood-red signal */
        --bg: #0a0a0a;
        --surface: #141311;
        --text: #e9e6dc;
        --subtext: #827d6f;
        --border: #1e1d1a;
        --hover: #f6f1e4;
        --accent: #ff6a2b;
        --accent-hot: #ff8c4d;
        --accent-glow: 0 0 14px 1px rgba(255,106,43,0.40), 0 0 32px 6px rgba(255,106,43,0.14);
      }

      /* Light theme — warm paper, ink text, blood-red signal */
      [data-theme='light'] {
        --bg: #f6f1e4;
        --surface: #ece7d9;
        --text: #1a1815;
        --subtext: #6b6557;
        --border: #d8d2c2;
        --hover: #0a0a0a;
        --accent: #d9531a;
        --accent-hot: #ff6a2b;
        --accent-glow: 0 0 14px 1px rgba(217,83,26,0.22), 0 0 28px 5px rgba(217,83,26,0.10);
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        transition: background-color 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }

      /* Selection in the signal color */
      ::selection {
        background: var(--accent);
        color: #0a0a0a;
      }

      .text-glow { text-shadow: var(--accent-glow); }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor-blink { animation: blink 1.1s step-end infinite; }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }
    </style>

              surface: 'var(--surface)',
              text: 'var(--text)',
              subtext: 'var(--subtext)',
              bordercolor: 'var(--border)',
              hovercolor: 'var(--hover)',
              accent: 'var(--accent)',
              accenthot: 'var(--accent-hot)',
            }
          }
        }
      }
    </script>
